# Configuración de la Base de Datos
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=app_user
quarkus.datasource.password=app123
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/citas_medicas

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=content-type,authorization,accept,origin